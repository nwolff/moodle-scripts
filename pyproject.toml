[project]
name = "moodle-scripts"
version = "0.1.0"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "fastexcel>=0.19.0",
    "munch>=4.0.0",
    "polars>=1.39.3",
    "progressbar2>=4.5.0",
    "pyarrow>=23.0.1",
    "python-dotenv>=1.2.2",
    "requests>=2.33.1",
    "structlog>=25.5.0",
]

[dependency-groups]
dev = [
    "munch-stubs>=0.1.3",
    "mypy>=1.20.0",
    "pytest>=8.0.0",
    "ruff>=0.15.9",
    "types-requests>=2.33.0.20260402",
]

[tool.ruff]
target-version = "py314"
line-length = 88
exclude = ["_version.py"] # Automatically generated

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP"]

extend-ignore = ["E501"]

[tool.mypy]
# Type check the interior of functions without type annotations
check_untyped_defs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
